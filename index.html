<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Legal Assistant — Counsel in Law</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --dark-panel: rgba(10,8,6,0.82);
      --text: #e8dcc8;
      --text-dim: rgba(232,220,200,0.55);
      --border: rgba(201,168,76,0.25);
      --shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    html, body { height: 100%; font-family: 'Josefin Sans', sans-serif; background: #0d0d0d; color: var(--text); overflow: hidden; }
    .hero-bg {
      position: fixed; inset: 0;
      background:
        linear-gradient(160deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.78) 100%),
        url('https://images.unsplash.com/photo-1575505586569-646b2ca898fc?w=1600&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35; pointer-events: none;
    }
    .page { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .wordmark { text-align: center; margin-bottom: 32px; animation: fadeDown 0.9s cubic-bezier(.22,1,.36,1) both; }
    .wordmark-eyebrow { font-weight: 200; font-size: 10px; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .wordmark-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(28px, 4vw, 42px); letter-spacing: 0.06em; color: var(--text); line-height: 1; }
    .wordmark-title em { font-style: italic; color: var(--gold-light); }
    .wordmark-rule { width: 48px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 10px auto 0; }
    .dialog {
      width: 100%; max-width: 640px;
      background: var(--dark-panel);
      border: 1px solid var(--border); border-radius: 2px;
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(201,168,76,0.12);
      animation: fadeUp 1s cubic-bezier(.22,1,.36,1) 0.15s both;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .dialog-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: rgba(201,168,76,0.04); }
    .dialog-header-icon { font-size: 15px; color: var(--gold); }
    .dialog-header-label { font-size: 9.5px; letter-spacing: 0.38em; text-transform: uppercase; font-weight: 300; color: var(--text-dim); }
    .dialog-header-dot { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: pulse 2.5s ease-in-out infinite; }
    #chatbox {
      flex: 1; min-height: 360px; max-height: 480px; overflow-y: auto;
      padding: 20px 24px 12px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin; scrollbar-color: var(--gold-dim) transparent;
    }
    #chatbox::-webkit-scrollbar { width: 3px; }
    #chatbox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #chatbox p { margin: 0; }
    .user {
      font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; line-height: 1.65;
      padding: 10px 14px; max-width: 85%;
      background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3);
      border-radius: 2px 2px 0 2px; align-self: flex-end; color: var(--text);
      text-align: right; display: block; margin-left: auto;
      animation: msgIn 0.35s cubic-bezier(.22,1,.36,1) both;
    }
    .bot {
      font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; line-height: 1.65;
      padding: 10px 14px; max-width: 85%;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px 2px 2px 0; align-self: flex-start; color: var(--text);
      display: block; margin-right: auto;
      animation: msgIn 0.35s cubic-bezier(.22,1,.36,1) both;
    }
    .bot a {
      color: var(--gold);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .bot a:hover {
      color: var(--gold-light);
    }
    .input-row { display: flex; border-top: 1px solid var(--border); }
    #query {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 16px 20px; font-family: 'Josefin Sans', sans-serif;
      font-size: 12px; font-weight: 300; letter-spacing: 0.06em;
      color: var(--text); caret-color: var(--gold);
    }
    #query::placeholder { color: rgba(232,220,200,0.28); font-style: italic; }
    button {
      width: 52px; background: transparent; border: none;
      border-left: 1px solid var(--border); cursor: pointer;
      color: var(--gold); transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    button:hover { background: var(--gold-dim); color: var(--gold-light); }
    button:active { transform: scale(0.92); }
    .disclaimer { margin-top: 14px; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(232,220,200,0.22); text-align: center; animation: fadeUp 1s 0.4s both; }
      .modal-overlay {
          display: none; position: fixed; inset: 0;
          background: rgba(0,0,0,0.7); z-index: 100;
          align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
          background: rgba(10,8,6,0.97); border: 1px solid var(--border);
          border-radius: 2px; padding: 28px; max-width: 580px; width: 90%;
          max-height: 70vh; overflow-y: auto;
          box-shadow: 0 40px 80px rgba(0,0,0,0.8);
          font-family: 'Cormorant Garamond', serif; font-size: 16px;
          line-height: 1.75; color: var(--text);
    }
    .modal-title {
          font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
          color: var(--gold); margin-bottom: 16px;
    }
    .modal-close {
          float: right; background: none; border: none;
          color: var(--text-dim); cursor: pointer; font-size: 18px;
          width: auto; border-left: none; padding: 0;
    }
    .modal-close:hover { color: var(--gold); background: none; }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(22px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes msgIn    { from { opacity:0; transform:translateY(8px);   } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 8px var(--gold); } 50% { opacity:0.35; box-shadow:0 0 2px var(--gold); } }
    @media (max-width:500px) { .page { padding:16px; justify-content:flex-end; padding-bottom:28px; } #chatbox { min-height:200px; max-height:260px; } }
  </style>
</head>
<body>
<div class="hero-bg"></div>
<div class="page">
  <div class="wordmark">
    <div class="wordmark-eyebrow">Counsel at Law</div>
    <div class="wordmark-title">Legal <em>Assistant</em></div>
    <div class="wordmark-rule"></div>
  </div>
  <div class="dialog">
    <div class="dialog-header">
      <span class="dialog-header-icon">⚖</span>
      <span class="dialog-header-label">Confidential Consultation</span>
      <span class="dialog-header-dot"></span>
    </div>
    <div id="chatbox"></div>
    <div class="input-row">
      <input type="text" id="query" placeholder="State your legal question…" autocomplete="off"
        onkeydown="if(event.key==='Enter') sendQuery()"/>
      <button onclick="sendQuery()" title="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="disclaimer">This tool provides general legal information only — not legal advice.</div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalBody"></div>
    </div>
  </div>
</div>

<!-- YOUR ORIGINAL SCRIPT — UNCHANGED -->
<script>
    async function sendQuery() {
        const query = document.getElementById("query").value;
        const chatbox = document.getElementById("chatbox");
        chatbox.innerHTML += `<p class="user">You: ${query}</p>`;
        const response = await fetch("/legal", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query })
        });
        const data = await response.json();
        chatbox.innerHTML += `<p class="bot">Bot: ${data.response.replace(/\n/g, '<br>')}</p>`;
        document.getElementById("query").value = "";
        chatbox.scrollTop = chatbox.scrollHeight;

        document.querySelectorAll('.section-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('modalTitle').textContent = 'BNS Section ' + this.dataset.section;
                document.getElementById('modalBody').textContent = this.dataset.text;
                document.getElementById('modalOverlay').classList.add('active');
            });
        });
    }

    function closeModal(e) {
        if (e.target.id === 'modalOverlay')
            document.getElementById('modalOverlay').classList.remove('active');
    }
</script>
</body>
</html>
